apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
spec:
  replicas: 3
  selector:
    matchLabels: # this mandatory field is used to identify which Pods belong to this Deployment
      project: expense
      division: finance
  template: # This is the Pod template, will create Pods with these specifications
    metadata:
      labels:
        project: expense
        division: finance
    spec:
      containers:
        - name: nginx
          image: nginx:1.14.2
