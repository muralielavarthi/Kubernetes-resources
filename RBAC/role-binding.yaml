apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: Dev-Role-Binding-K8
  namespace: dev
subjects:
  - kind: Group
    name: Developer-Group-k8 # 👈 must match Access Entry
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: Dev-Role-K8 # 👈 must match Role name
  apiGroup: rbac.authorization.k8s.io
