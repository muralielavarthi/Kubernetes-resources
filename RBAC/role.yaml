apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: Dev-Role-K8
  namespace: dev
rules:
  - apiGroups: [""] # "" indicates the core API group, used for resources like pods, services, etc.
    resources: ["pods"] # specify the resources that this role can access
    verbs: ["get", "list", "watch", "create", "delete"] # specify the actions that can be performed on the resources
