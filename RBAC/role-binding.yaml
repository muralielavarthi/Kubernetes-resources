apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dev-rolebinding
  namespace: dev
subjects:
  - kind: Group
    name: dev-group # 👈 must match Access Entry
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: dev-role # 👈 must match Role name
  apiGroup: rbac.authorization.k8s.io
