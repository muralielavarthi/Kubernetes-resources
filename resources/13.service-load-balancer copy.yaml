apiVersion: v1
kind: Service
metadata:
  name: murali-load-balancer-service
spec:
  type: LoadBalancer
  selector:
    project: expense
    division: finance
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30007

---
apiVersion: v1
kind: Pod
metadata:
  name: nginx1
  labels:
    project: expense
    division: finance
spec:
  containers:
    - name: nginx
      image: nginx:stable

---
apiVersion: v1
kind: Pod
metadata:
  name: nginx2
  labels:
    project: expense
    division: finance
spec:
  containers:
    - name: nginx
      image: nginx:stable
