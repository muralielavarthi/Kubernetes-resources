apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: calc-role-binding
subjects:
  - kind: User
    name: muralixy # "name" is case sensitive #user name
    apiGroup: rbac.authorization.k8s.io
roleRef:
  # "roleRef" specifies the binding to a Role / ClusterRole
  kind: Role #this must be Role or ClusterRole
  name: calc-trainee-role # this must match the name of the Role you wish to bind to (tomorrow, it can be different role)
  apiGroup: rbac.authorization.k8s.io
